services:
    postgres:
        image: postgres:18
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        ports:
            - ${POSTGRES_PORT}:${POSTGRES_PORT}
        volumes:
            - ${APPDATA}/postgres/data:/var/lib/postgresql/data
            - ${APPDATA}/postgres/setup:/docker-entrypoint-initdb.d:ro
        networks:
            - core_net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
            interval: 60s
            timeout: 10s
            retries: 20
            start_period: 15s
        deploy:
            replicas: 1
            restart_policy:
                condition: any
                delay: 5s
            placement:
                constraints:
                    - node.role == manager

networks:
    core_net:
        external: true